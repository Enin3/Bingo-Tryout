<div id="bingo-app" class="max-w-7xl mx-auto p-4 transition-opacity duration-500 opacity-0">
    
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-8">
            
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl border border-slate-100">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h2 class="text-2xl font-black text-slate-800 tracking-tight">BINGO GRID</h2>
                        <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">拖拽右侧任务至格子进行绑定</p>
                    </div>
                    <div class="bg-indigo-50 px-6 py-2 rounded-2xl text-indigo-600 font-black">
                        {{ progress }}% 完成
                    </div>
                </div>

                <div class="grid gap-4" :style="`grid-template-columns: repeat(${gridSize}, 1fr)`">
                    <div v-for="(cell, idx) in grid" :key="idx"
                         @click="toggleCell(idx)"
                         @dragover.prevent
                         @drop="onDrop($event, idx)"
                         class="aspect-square border-2 border-dashed rounded-3xl flex flex-col items-center justify-center cursor-pointer transition-all hover:scale-[1.02] active:scale-95 group relative overflow-hidden"
                         :style="{ 
                            borderColor: cell.task ? (cell.done ? doneColor : cell.task.finalColor) : '#f1f5f9',
                            backgroundColor: cell.done ? doneColor + '15' : 'white'
                         }">
                        
                        <template v-if="cell.task">
                            <span class="text-[10px] font-bold text-center px-2 leading-tight z-10" :style="{ color: cell.task.finalColor }">
                                {{ cell.task.name }}
                            </span>
                            <div v-if="cell.done" class="absolute inset-0 flex items-center justify-center text-xl pointer-events-none opacity-30">✅</div>
                            <div class="absolute bottom-2 text-[8px] opacity-20 font-bold">权: {{ cell.weight }}%</div>
                        </template>
                        
                        <span v-else class="text-[8px] font-black text-slate-200 uppercase tracking-widest group-hover:text-indigo-300">Empty</span>
                    </div>
                </div>
            </div>

            <div class="mt-8 bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-2 h-4 bg-indigo-500 rounded-full"></div>
                    <span class="text-xs font-bold text-slate-400 uppercase">打卡活跃度</span>
                </div>
                <div class="flex flex-wrap gap-1.5 justify-center">
                    <div v-for="day in heatDays" :key="day.date"
                         class="w-3.5 h-3.5 rounded-sm transition-colors"
                         :style="{ backgroundColor: ['#f8fafc','#e0e7ff','#818cf8','#4f46e5','#312e81'][day.level] }">
                    </div>
                </div>
            </div>
        </div>


        <div class="lg:col-span-4 space-y-4">
            
            <div class="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-200 min-h-[600px] flex flex-col">
                
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-slate-700">任务资源池</h3>
                    <div class="flex gap-1">
                        <button @click="addFolder" class="bg-white p-2 rounded-xl shadow-sm text-xs hover:bg-indigo-50 transition-colors" title="创建文件夹">📁+</button>
                        <button @click="addTask" class="bg-white p-2 rounded-xl shadow-sm text-xs hover:bg-emerald-50 transition-colors" title="创建任务">📄+</button>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                    
                    <div v-for="node in tree" :key="node.id" class="select-none">
                        
                        <div v-if="node.type === 'folder'" class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
                            <div @click="node.isOpen = !node.isOpen"
                                 class="p-4 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition-colors">
                                <span class="text-xs font-bold" :style="{ color: node.color }">📁 {{ node.name }}</span>
                                <span class="text-[10px] text-slate-300">{{ node.isOpen ? '▲' : '▼' }}</span>
                            </div>
                            
                            <div v-if="node.isOpen" class="p-2 bg-slate-50/50 space-y-2 border-t border-slate-50">
                                <div v-for="child in node.children" :key="child.id"
                                     draggable="true"
                                     @dragstart="onDragStart($event, child, node.color)"
                                     class="p-3 bg-white rounded-xl shadow-sm text-[10px] font-bold cursor-grab active:cursor-grabbing border-l-4 transition-transform hover:translate-x-1"
                                     :style="{ borderLeftColor: child.color || node.color, color: child.color || node.color }">
                                    📄 {{ child.name }}
                                </div>
                                <div v-if="!node.children || node.children.length === 0" class="text-[8px] text-slate-300 text-center py-2">
                                    (文件夹为空)
                                </div>
                            </div>
                        </div>

                        <div v-else
                             draggable="true"
                             @dragstart="onDragStart($event, node, null)"
                             class="p-4 bg-white rounded-2xl shadow-sm text-xs font-bold cursor-grab active:cursor-grabbing border border-slate-100 transition-transform hover:translate-x-1"
                             :style="{ color: node.color || '#475569' }">
                            📄 {{ node.name }}
                        </div>

                    </div> </div>

                <div class="mt-4 p-4 bg-slate-800 rounded-3xl text-white shadow-lg">
                    <div class="text-[10px] opacity-50 font-bold uppercase mb-2 tracking-widest">全局填色设置</div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <input type="color" v-model="doneColor" class="w-8 h-8 rounded-lg bg-transparent border-none cursor-pointer">
                            <span class="text-xs font-black">完成色号</span>
                        </div>
                        <div class="text-[10px] text-slate-400">
                            {{ doneColor }}
                        </div>
                    </div>
                </div>

            </div>
        </div> </div>
</div>
